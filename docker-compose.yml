version: '3.8'

networks:
  cdc-network:
    driver: bridge

volumes:
  mariadb-data:
  kafka-data:
  minio-data:
  airflow-db-data:
  airflow-logs:
  clickhouse-data:

services:

# =========================
# MariaDB
# =========================
  mariadb:
    image: mariadb:10.6
    container_name: mariadb
    ports:
      - "3307:3306"
    environment:
      MARIADB_ROOT_PASSWORD: 123456
      MARIADB_DATABASE: ecommerce_db
    command:
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --server-id=1
      - --binlog-row-image=FULL
    volumes:
      - mariadb-data:/var/lib/mysql
    networks:
      - cdc-network


# =========================
# Zookeeper
# =========================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - cdc-network


# =========================
# Kafka
# =========================
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - cdc-network


# =========================
# Schema Registry
# =========================
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: schema-registry
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - cdc-network


# =========================
# Kafka Connect
# =========================
  connect:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: connect
    depends_on:
      - kafka
      - schema-registry
      - mariadb
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:29092
      CONNECT_REST_ADVERTISED_HOST_NAME: connect
      CONNECT_GROUP_ID: connect-cluster

      CONNECT_CONFIG_STORAGE_TOPIC: connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: connect-status

      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1

      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components

      CONNECT_KEY_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_VALUE_CONVERTER: io.confluent.connect.avro.AvroConverter

      CONNECT_KEY_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081

    networks:
      - cdc-network


# =========================
# MinIO
# =========================
  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - cdc-network


# =========================
# MinIO init
# =========================
  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set minio http://minio:9000 admin password; do
        echo 'waiting for minio...';
        sleep 2;
      done;
      mc mb minio/bronze || true;
      mc mb minio/silver || true;
      exit 0;
      "
    networks:
      - cdc-network


# =========================
# Airflow DB
# =========================
  airflow-db:
    image: postgres:15
    container_name: airflow-db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    networks:
      - cdc-network


# =========================
# Airflow image build
# =========================
  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-webserver
    depends_on:
      - airflow-db
      - minio

    ports:
      - "8080:8080"

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW_HOME: /opt/airflow

      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:
        postgresql+psycopg2://airflow:airflow@airflow-db/airflow

      PYTHONPATH: /opt/airflow/scripts

    volumes:
      - ./dags:/opt/airflow/dags
      - D:/Work/ETL_2/dags/etl_scripts:/opt/airflow/scripts
      - airflow-logs:/opt/airflow/logs

    command: webserver

    networks:
      - cdc-network


# =========================
# Scheduler
# =========================
  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow

    container_name: airflow-scheduler

    depends_on:
      - airflow-webserver
      - airflow-db
      - minio

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW_HOME: /opt/airflow

      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:
        postgresql+psycopg2://airflow:airflow@airflow-db/airflow

      PYTHONPATH: /opt/airflow/scripts

    volumes:
      - ./dags:/opt/airflow/dags
      - D:/Work/ETL_2/dags/etl_scripts:/opt/airflow/scripts
      - airflow-logs:/opt/airflow/logs

    command: scheduler

    networks:
      - cdc-network


# =========================
# Init Airflow
# =========================
  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow

    depends_on:
      - airflow-db

    entrypoint: >
      bash -c "
      airflow db init &&
      airflow users create \
      --username admin \
      --password admin \
      --firstname admin \
      --lastname admin \
      --role Admin \
      --email admin@email.com
      "

    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:
        postgresql+psycopg2://airflow:airflow@airflow-db/airflow

    networks:
      - cdc-network


    